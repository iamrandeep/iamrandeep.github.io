<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Restricted</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #2a2a3d;
      --accent:    #ff3c5a;
      --accent2:   #ff8c42;
      --dim:       #4a4a6a;
      --text:      #e8e8f0;
      --sub:       #8888aa;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      animation: gridDrift 20s linear infinite;
      z-index: 0;
    }
    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* Red vignette pulse */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(255,60,90,0.08) 100%);
      animation: pulse 3s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes pulse {
      from { opacity: 0.5; }
      to   { opacity: 1; }
    }

    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    /* Lock icon SVG */
    .lock-wrap {
      position: relative;
      margin-bottom: 2.5rem;
      animation: floatLock 4s ease-in-out infinite;
    }
    @keyframes floatLock {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .lock-ring {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(255,60,90,0.25);
      animation: ringExpand 2.5s ease-out infinite;
    }
    .lock-ring:nth-child(2) { inset: -34px; animation-delay: 0.6s; }
    .lock-ring:nth-child(3) { inset: -52px; animation-delay: 1.2s; }
    @keyframes ringExpand {
      0%   { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 0;   transform: scale(1.15); }
    }
    .lock-svg {
      display: block;
      filter: drop-shadow(0 0 24px rgba(255,60,90,0.55));
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,60,90,0.1);
      border: 1px solid rgba(255,60,90,0.35);
      border-radius: 4px;
      padding: 0.3rem 0.85rem;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      text-align: center;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--sub);
      text-align: center;
      max-width: 340px;
      line-height: 1.8;
      animation: slideUp 0.7s 0.15s cubic-bezier(.22,1,.36,1) both;
    }

    /* Divider */
    .divider {
      width: 320px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 2rem 0;
      animation: slideUp 0.7s 0.25s cubic-bezier(.22,1,.36,1) both;
    }

    /* Info rows */
    .info-block {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 340px;
      animation: slideUp 0.7s 0.35s cubic-bezier(.22,1,.36,1) both;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--sub);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.6rem;
    }
    .info-row span:last-child { color: var(--text); }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 0.75rem;
      margin-top: 2.2rem;
      animation: slideUp 0.7s 0.45s cubic-bezier(.22,1,.36,1) both;
    }
    .btn {
      padding: 0.65rem 1.4rem;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px rgba(255,60,90,0.35);
    }
    .btn-primary:hover {
      background: #ff1f40;
      box-shadow: 0 0 32px rgba(255,60,90,0.55);
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: transparent;
      color: var(--sub);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--dim);
      transform: translateY(-1px);
    }

    /* Error code watermark */
    .watermark {
      position: fixed;
      bottom: 2.5rem;
      right: 3rem;
      font-family: 'Syne', sans-serif;
      font-size: 7rem;
      font-weight: 800;
      color: rgba(255,60,90,0.04);
      letter-spacing: -0.04em;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <div class="stage">

    <div class="lock-wrap">
      <div class="lock-ring"></div>
      <div class="lock-ring"></div>
      <div class="lock-ring"></div>
      <svg class="lock-svg" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="12" y="32" width="48" height="34" rx="6" fill="#13131a" stroke="#ff3c5a" stroke-width="2"/>
        <path d="M22 32V24C22 16.268 28.268 10 36 10C43.732 10 50 16.268 50 24V32" stroke="#ff3c5a" stroke-width="2" stroke-linecap="round"/>
        <circle cx="36" cy="48" r="5" fill="#ff3c5a"/>
        <line x1="36" y1="53" x2="36" y2="59" stroke="#ff3c5a" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Error 403
    </div>

    <h1>Access Denied</h1>

    <p class="subtitle">You don't have permission to view this resource. Contact your administrator or request access.</p>

    <div class="divider"></div>

    <div class="info-block">
      <div class="info-row">
        <span>Status</span>
        <span>403 Forbidden</span>
      </div>
      <div class="info-row">
        <span>Resource</span>
        <span>/dashboard/admin</span>
      </div>
      <div class="info-row">
        <span>Required Role</span>
        <span>Administrator</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary">Request Access</button>
      <button class="btn btn-ghost">Go Back</button>
    </div>

  </div>

  <div class="watermark">403</div>

</body>
</html>
